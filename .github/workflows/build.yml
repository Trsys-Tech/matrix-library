name: Build Library

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - react-version: 18.3.1
            react-types-major: 18
          - react-version: 19.0.0
            react-types-major: 19

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.10.0

      - name: Install dependencies
        run: npm install

      - name: Install React ${{ matrix.react-version }}
        run: npm install --no-save react@${{ matrix.react-version }} react-dom@${{ matrix.react-version }} @types/react@^${{ matrix.react-types-major }} @types/react-dom@^${{ matrix.react-types-major }}

      - name: Build library
        run: npm run build

      - name: Push to dist branch
        run: |
          # Set up Git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create dist branch if it doesn't exist
          git branch -D dist || true
          git switch -c dist

          # Remove all files except dist folder and package.json
          find . -maxdepth 1 ! -name 'dist' ! -name 'package.json' ! -name '.' ! -name .git | xargs rm -rf

          # Commit and push changes
          git add .
          git commit -m "Deploy to dist branch"
          git push origin dist --force
