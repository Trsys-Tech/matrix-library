name: Build Library

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - react-version: 18.3.1
            react-types-major: 18
          - react-version: 19.2.4
            react-types-major: 18
            # NOTE: react-types-major stays at 18 even for React 19 testing due to a transitive
            # dependency type incompatibility in the Storybook ecosystem:
            # @storybook/addon-essentials → @storybook/addon-docs → @mdx-js/mdx → @types/mdx
            # The @types/mdx typings do not work with React 19 type definitions.
            # This is dev-only (Storybook), so React 19 runtime validation still occurs.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0

      - name: Install dependencies
        run: npm install

      - name: Install React ${{ matrix.react-version }}
        run: npm install --no-save react@${{ matrix.react-version }} react-dom@${{ matrix.react-version }} @types/react@^${{ matrix.react-types-major }} @types/react-dom@^${{ matrix.react-types-major }}

      - name: Build library
        run: npm run build

      - name: Push to dist branch
        run: |
          # Set up Git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch latest dist branch
          git fetch origin dist || true
          git checkout -B dist origin/dist || git checkout -b dist

          # Remove all files except dist folder and package.json
          find . -maxdepth 1 ! -name 'dist' ! -name 'package.json' ! -name '.' ! -name .git | xargs rm -rf

          # Commit and push changes
          git add .
          git commit -m "Deploy to dist branch"
          git push origin dist --force
